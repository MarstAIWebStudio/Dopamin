<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 기기 반응형 레이아웃 및 줌 방지 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 도파민 디스펜서 2.0 ⚡</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none; /* iOS 지원 */
            -webkit-touch-callout: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b16;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* 모바일 브라우저 주소창 숨김 대비 */
            height: calc(var(--vh, 1vh) * 100); 
        }
        #container {
            text-align: center;
            z-index: 10;
            width: 100%;
            padding: 20px;
        }
        h1 {
            font-size: calc(1.8rem + 2vw); /* 화면 크기에 비례하는 폰트 크기 */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }
        #score-board {
            font-size: calc(1.2rem + 1vw);
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            margin-bottom: 4vh;
        }
        /* 도파민 버튼 (모바일 터치 최적화) */
        #dopamine-btn {
            width: 85%;
            max-width: 320px;
            padding: 18px 0;
            font-size: calc(1.1rem + 0.5vw);
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff007f, #7f00ff, #00ffff);
            background-size: 200% 200%;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
            transition: transform 0.05s, box-shadow 0.05s;
            animation: gradientMove 3s ease infinite;
            /* 모바일 터치 딜레이 제거 및 하이라이트 방지 */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* 마우스 오버(PC) 및 터치(모바일) 시 시각 피드백 */
        #dopamine-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
        }
        /* 파티클 레이어 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        /* 잭팟 메시지 */
        #jackpot {
            position: fixed;
            top: 25%;
            font-size: calc(2.5rem + 3vw);
            font-weight: 900;
            color: #ffff00;
            text-shadow: 0 0 20px #ffaa00, 0 0 40px #ff5500;
            display: none;
            z-index: 20;
        }
        .show-jackpot {
            display: block !important;
            animation: banger 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes banger {
            0% { transform: scale(0) rotate(-10deg); }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="container">
        <h1>DOPAMINE RUSH</h1>
        <div id="score-board">🧠 Dopamine: <span id="score">0</span>%</div>
        <button id="dopamine-btn">PUSH FOR RUSH!</button>
    </div>

    <div id="jackpot">🔥 JACKPOT 🔥</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('dopamine-btn');
        const scoreDisplay = document.getElementById('score');
        const jackpot = document.getElementById('jackpot');

        let score = 0;
        let particles = [];
        let isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        // 모바일 브라우저 주소창 높이 변화 대응
        function setVh() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', setVh);
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 200);
            setTimeout(setVh, 200);
        });
        setVh();

        // 캔버스 크기 동적 맞추기 (디바이스 픽셀 해상도 대응)
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 파티클 클래스
        class Particle {
            constructor(x, y, isJackpot = false) {
                this.x = x;
                this.y = y;
                // 모바일에서는 성능을 위해 파티클 크기 및 속도 약조절
                const sizeModifier = isMobile ? 0.8 : 1;
                this.size = (Math.random() * 5 + 3) * sizeModifier;
                if (isJackpot) this.size *= 2.5;
                
                const speedMultiplier = isJackpot ? (isMobile ? 14 : 22) : (isMobile ? 10 : 14);
                this.speedX = (Math.random() - 0.5) * speedMultiplier;
                this.speedY = (Math.random() - 0.5) * speedMultiplier - (isJackpot ? 4 : 2);
                this.gravity = 0.25;
                
                const colors = ['#ff007f', '#7f00ff', '#00ffff', '#ff00ff', '#00ff00', '#ffff00'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }

            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                // 모바일 기기 성능 저하 방지를 위해 모바일은 그림자 효과 축소
                if (!isMobile) {
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = this.color;
                }
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 애니메이션 루프
        function animate() {
            // 화면 픽셀 클리어 시 실제 창 크기 기준
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // Web Audio API 초기화 (사용자 첫 터치 시 활성화)
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 공통 클릭/터치 액션 함수
        function handlePush(e) {
            e.preventDefault(); // 모바일 연타 시 브라우저 확대/스크롤 방지
            initAudio();

            // 터치/클릭 좌표 계산
            const rect = btn.getBoundingClientRect();
            const clickX = rect.left + rect.width / 2;
            const clickY = rect.top + rect.height / 2;

            playLaserSound();

            let gain = Math.floor(Math.random() * 5) + 3;
            
            // 8% 확률 잭팟
            if (Math.random() < 0.08) {
                gain = 77;
                triggerJackpot();
                const pCount = isMobile ? 60 : 120; // 모바일 과부하 방지
                for (let i = 0; i < pCount; i++) {
                    particles.push(new Particle(window.innerWidth / 2, window.innerHeight / 2, true));
                }
            } else {
                const pCount = isMobile ? 12 : 20;
                for (let i = 0; i < pCount; i++) {
                    particles.push(new Particle(clickX, clickY, false));
                }
            }

            score += gain;
            scoreDisplay.innerText = score.toLocaleString(); // 세자리 콤마 추가
        }

        // PC와 모바일 모두 즉각적인 반응을 위해 이벤트를 이원화하되 중복 실행 차단
        btn.addEventListener('touchstart', handlePush, { passive: false });
        btn.addEventListener('mousedown', (e) => {
            // 터치 이벤트가 먼저 일어난 경우 마우스 이벤트는 패스
            if (e.button === 0 && !('ontouchstart' in window)) {
                handlePush(e);
            }
        });

        function triggerJackpot() {
            jackpot.classList.add('show-jackpot');
            playJackpotSound();
            setTimeout(() => {
                jackpot.classList.remove('show-jackpot');
            }, 800);
        }

        // 사운드 함수
        function playLaserSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(280, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(850, audioCtx.currentTime + 0.12);

            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        function playJackpotSound() {
            if(!audioCtx) return;
            for(let i=0; i<3; i++) {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc.type = 'square';
                    osc.frequency.setValueAtTime(440 + (i*220), audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);

                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.25);
                }, i * 80);
            }
        }
    </script>
</body>
</html>
