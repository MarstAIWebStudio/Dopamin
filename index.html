<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🤪 무작위 도파민 발전소 🤪</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #05050a;
            overflow: hidden;
            font-family: sans-serif;
            cursor: pointer;
            perspective: 1000px;
        }
        /* 안내 문구 */
        #guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: calc(1.5rem + 1vw);
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            letter-spacing: 2px;
            animation: blink 1s infinite alternate;
            z-index: 2;
        }
        @keyframes blink {
            from { opacity: 0.3; } to { opacity: 0.8; }
        }

        /* 스코어 레이어 */
        #score-board {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffcc;
            font-size: 2rem;
            font-weight: 900;
            text-shadow: 0 0 10px #00ffcc;
            z-index: 10;
            pointer-events: none;
        }

        /* 캔버스 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* [이벤트 1] 화면 흔들림 효과 */
        .shake {
            animation: shakeAnim 0.15s infinite;
        }
        @keyframes shakeAnim {
            0% { transform: translate(3px, 5px) rotate(1deg); }
            20% { transform: translate(-5px, -3px) rotate(-2deg); }
            40% { transform: translate(6px, -1px) rotate(1deg); }
            60% { transform: translate(-3px, 2px) rotate(0deg); }
            80% { transform: translate(4px, 4px) rotate(-1deg); }
            100% { transform: translate(-2px, -4px) rotate(2deg); }
        }

        /* [이벤트 2] 화면 색상 반전 플래시 */
        .flash {
            animation: flashAnim 0.3s steps(2) infinite;
        }
        @keyframes flashAnim {
            0% { background-color: #ff0055; filter: invert(0); }
            50% { background-color: #00ffaa; filter: invert(1); }
            100% { background-color: #0055ff; filter: invert(0); }
        }

        /* [이벤트 3] 거대 이모지 폭탄 스타일 */
        .emoji-bomb {
            position: absolute;
            font-size: 150px;
            pointer-events: none;
            z-index: 5;
            animation: popOut 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards;
        }
        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(360deg); opacity: 0; }
        }

        /* [이벤트 4] 잭팟 오버레이 */
        #jackpot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 0, 0.9);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(3rem + 5vw);
            font-weight: 900;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }
        .jackpot-active {
            animation: jackpotAnim 0.4s ease forwards;
        }
        @keyframes jackpotAnim {
            0% { opacity: 0; transform: scale(0.5) rotate(-20deg); }
            30% { opacity: 1; transform: scale(1.2) rotate(10deg); }
            70% { opacity: 1; transform: scale(1) rotate(-5deg); }
            100% { opacity: 0; transform: scale(2) rotate(0deg); }
        }

        /* [이벤트 5] 3D 회전 매트릭스 */
        .matrix-rotate {
            animation: matrixAnim 0.5s ease-in-out forwards;
        }
        @keyframes matrixAnim {
            0% { transform: rotateY(0deg) rotateX(0deg) scale(1); }
            50% { transform: rotateY(180deg) rotateX(45deg) scale(0.7); }
            100% { transform: rotateY(360deg) rotateX(0deg) scale(1); }
        }
    </style>
</head>
<body>

    <div id="guide">화면 아무 데나 미친 듯이 클릭해보세요!</div>
    <div id="score-board">🔥 DOPAMINE: <span id="score">0</span></div>
    <div id="jackpot-screen">💰 CRUSH JACKPOT!! 💰</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const jackpotScreen = document.getElementById('jackpot-screen');
        const body = document.body;

        let score = 0;
        let particles = [];
        const emojis = ['🔥', '✨', '⚡', '💊', '👑', '🤩', '🎰', '🚀', '🔮', '🎉', '🤑', '👽'];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 파티클 시스템 (클릭 시 터지는 불꽃)
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 8 + 4;
                this.speedX = (Math.random() - 0.5) * 20;
                this.speedY = (Math.random() - 0.5) * 20;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // 오디오 시스템
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // 효과음 랜덤 생성기
        function playRandomSound(type) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'glitch') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(Math.random() * 800 + 200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            } else if (type === 'jackpot') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            } else {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(Math.random() * 1000 + 500, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            }
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // 핵심: 무작위 예측 불가 이벤트 핸들러
        function triggerDopamine(e) {
            e.preventDefault();
            initAudio();
            
            // 매 시도마다 가이드 문구는 즉시 삭제
            document.getElementById('guide').style.display = 'none';

            // 터치/클릭 위치 획득
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);

            // 1. 무조건 파티클은 기본 탑재
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(clientX, clientY));
            }

            // 2. 점수 무작위 폭등
            score += Math.floor(Math.random() * 500) + 7;
            scoreDisplay.innerText = score.toLocaleString();

            // 3. ★ 예측 불가 행동 주사위 굴리기 (0 ~ 4) ★
            const dice = Math.floor(Math.random() * 5);

            switch(dice) {
                case 0: // 지진 효과
                    body.classList.add('shake');
                    playRandomSound('glitch');
                    setTimeout(() => body.classList.remove('shake'), 200);
                    break;
                    
                case 1: // 화면 미친듯이 번쩍이기
                    body.classList.add('flash');
                    playRandomSound('glitch');
                    setTimeout(() => body.classList.remove('flash'), 300);
                    break;

                case 2: // 거대 이모지 팝업 폭탄
                    const emoji = document.createElement('div');
                    emoji.className = 'emoji-bomb';
                    emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    emoji.style.left = clientX + 'px';
                    emoji.style.top = clientY + 'px';
                    document.body.appendChild(emoji);
                    playRandomSound('pop');
                    setTimeout(() => emoji.remove(), 600);
                    break;

                case 3: // 잭팟 전면 경고 화면
                    jackpotScreen.classList.add('jackpot-active');
                    playRandomSound('jackpot');
                    setTimeout(() => jackpotScreen.classList.remove('jackpot-active'), 400);
                    break;

                case 4: // 화면 3D 회전 뒤틀기
                    body.classList.add('matrix-rotate');
                    playRandomSound('pop');
                    setTimeout(() => body.classList.remove('matrix-rotate'), 500);
                    break;
            }
        }

        // 마우스 및 터치 이벤트 바인딩 (배경 전체)
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0 && !('ontouchstart' in window)) triggerDopamine(e);
        });
        window.addEventListener('touchstart', triggerDopamine, { passive: false });

    </script>
</body>
</html>
