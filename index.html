<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 자동 도파민 비트 발전소 ⚡</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030308;
            overflow: hidden;
            font-family: system-ui, sans-serif;
            cursor: pointer;
            perspective: 1000px;
        }

        /* 상단 제어 바 */
        #control-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        #score-board {
            color: #00ffff;
            font-size: 2.5rem;
            font-weight: 900;
            text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
            pointer-events: none;
        }

        /* 자동 클릭 토글 버튼 */
        #autoclick-btn {
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            background: #ff007f;
            border: none;
            border-radius: 20px;
            box-shadow: 0 0 15px #ff007f;
            cursor: pointer;
            transition: all 0.2s;
        }
        #autoclick-btn.active {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 25px #00ffcc;
        }

        /* 캔버스 */
        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* 화면 연출 효과들 */
        .shake { animation: shakeAnim 0.1s infinite; }
        @keyframes shakeAnim {
            0% { transform: translate(4px, -2px) rotate(0.5deg); }
            50% { transform: translate(-3px, 3px) rotate(-0.5deg); }
            100% { transform: translate(2px, 1px) rotate(0deg); }
        }

        .flash { animation: flashAnim 0.2s steps(2) infinite; }
        @keyframes flashAnim {
            0% { background-color: #ff00ff; filter: hue-rotate(90deg); }
            100% { background-color: #00ffff; filter: hue-rotate(0deg); }
        }

        .emoji-bomb {
            position: absolute;
            font-size: 120px;
            pointer-events: none;
            z-index: 5;
            animation: popOut 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.4) forwards;
        }
        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-30deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.3) rotate(45deg); opacity: 0; }
        }

        #jackpot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 0, 0.95);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(2.5rem + 6vw);
            font-weight: 900;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
        }
        .jackpot-active { animation: jackpotAnim 0.35s ease forwards; }
        @keyframes jackpotAnim {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(1.8); }
        }

        .matrix-rotate { animation: matrixAnim 0.4s ease-in-out forwards; }
        @keyframes matrixAnim {
            0% { transform: scale(1) rotateX(0); }
            50% { transform: scale(0.8) rotateX(25deg) rotateY(15deg); }
            100% { transform: scale(1) rotateX(0); }
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <div id="score-board">⚡ PUMP: <span id="score">0</span></div>
        <button id="autoclick-btn">뇌 내 자동 재생 (OFF)</button>
    </div>

    <div id="jackpot-screen">🎰 FEVER TIME!! 🎰</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const jackpotScreen = document.getElementById('jackpot-screen');
        const autoclickBtn = document.getElementById('autoclick-btn');
        const body = document.body;

        let score = 0;
        let particles = [];
        let isAutoClicking = false;
        let autoClickTimeout = null;
        const emojis = ['🔥', '⚡', '💊', '👑', '🎰', '🚀', '🤑', '💥', '👻', '🍭'];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 시각 효과용 파티클
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 6 + 4;
                this.speedX = (Math.random() - 0.5) * 18;
                this.speedY = (Math.random() - 0.5) * 18;
                this.color = `hsl(${Math.random() * 360}, 100%, 65%)`;
                this.alpha = 1;
                this.decay = Math.random() * 0.04 + 0.02;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // 사운드 시스템
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'heavy') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            } else if (type === 'jackpot') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.08);
                osc.frequency.setValueAtTime(1300, audioCtx.currentTime + 0.16);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            } else {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(Math.random() * 600 + 400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            }
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // 메인 도파민 폭발 함수
        function triggerDopamine(x, y) {
            initAudio();
            
            // 기본 파티클 분사
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y));
            }

            score += Math.floor(Math.random() * 100) + 10;
            scoreDisplay.innerText = score.toLocaleString();

            // 5가지 예측 불가 행동 무작위 매칭
            const dice = Math.floor(Math.random() * 5);
            switch(dice) {
                case 0:
                    body.classList.add('shake');
                    playSound('heavy');
                    setTimeout(() => body.classList.remove('shake'), 120);
                    break;
                case 1:
                    body.classList.add('flash');
                    playSound('heavy');
                    setTimeout(() => body.classList.remove('flash'), 180);
                    break;
                case 2:
                    const emoji = document.createElement('div');
                    emoji.className = 'emoji-bomb';
                    emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    emoji.style.left = x + 'px';
                    emoji.style.top = y + 'px';
                    document.body.appendChild(emoji);
                    playSound('light');
                    setTimeout(() => emoji.remove(), 500);
                    break;
                case 3:
                    jackpotScreen.classList.add('jackpot-active');
                    playSound('jackpot');
                    setTimeout(() => jackpotScreen.classList.remove('jackpot-active'), 350);
                    break;
                case 4:
                    body.classList.add('matrix-rotate');
                    playSound('light');
                    setTimeout(() => body.classList.remove('matrix-rotate'), 400);
                    break;
            }
        }

        // 인간이 가장 도파민을 많이 느끼는 변칙적 리듬 시뮬레이터 (마스터 비트)
        function runDopamineRhythm() {
            if (!isAutoClicking) return;

            // 랜덤 화면 좌표 지정 (가장 다채롭게 터지는 영역)
            const randomX = Math.random() * (window.innerWidth * 0.6) + (window.innerWidth * 0.2);
            const randomY = Math.random() * (window.innerHeight * 0.6) + (window.innerHeight * 0.2);

            triggerDopamine(randomX, randomY);

            // [핵심 알고리즘] 다음에 클릭할 때까지의 '도파민 유도용' 대기 시간 계산
            let nextInterval = 444; // 기본 135 BPM 속도 (약 444ms)

            const r = Math.random();
            if (r < 0.15) {
                // 1) 엇박 밀당: 뇌를 멈칫하게 만드는 의도적인 긴 침묵 (밀당 박자)
                nextInterval = 850;
            } else if (r < 0.35) {
                // 2) 도파민 폭발: 심장박동을 고조시키는 초고속 다다닥 연타 박자
                nextInterval = 120;
            } else if (r < 0.50) {
                // 3) 스윙 비트: 그루브를 타게 만드는 전형적인 절뚝이 박자
                nextInterval = 280;
            }

            // 다음 비트로 연쇄 실행
            autoClickTimeout = setTimeout(runDopamineRhythm, nextInterval);
        }

        // 수동 클릭/터치 이벤트 (사용자가 직접 누를 때도 작동)
        function handleManualClick(e) {
            if (e.target === autoclickBtn) return; // 버튼 누를 때는 제외
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            triggerDopamine(clientX, clientY);
        }

        window.addEventListener('mousedown', (e) => {
            if (e.button === 0 && !('ontouchstart' in window)) handleManualClick(e);
        });
        window.addEventListener('touchstart', handleManualClick, { passive: false });

        // 자동 클릭 모드 토글 스위치
        autoclickBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            initAudio();
            isAutoClicking = !isAutoClicking;

            if (isAutoClicking) {
                autoclickBtn.innerText = "뇌 내 자동 재생 (ON)";
                autoclickBtn.classList.add('active');
                runDopamineRhythm();
            } else {
                autoclickBtn.innerText = "뇌 내 자동 재생 (OFF)";
                autoclickBtn.classList.remove('active');
                clearTimeout(autoClickTimeout);
            }
        });
    </script>
</body>
</html>
